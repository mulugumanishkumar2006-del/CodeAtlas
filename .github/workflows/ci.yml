name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: 'pnpm'

      - name: Install JS/TS Dependencies
        run: pnpm install

      - name: Prettier Format Check
        run: pnpm run format:js

      - name: ESLint Check
        run: pnpm run lint:js

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: Python Ruff Linter Check
        run: ruff check apps/backend

      - name: Python Black Formatter Check
        run: black --check apps/backend
